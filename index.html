    <style>
      html { background: #020202; }
      body { background: #020202; color: #fff; margin: 0; font-family: Cairo, sans-serif; }
      #root { min-height: 100vh; }

      /* Initial loader */
      #initial-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #020202; z-index: 99999;
        transition: opacity 0.35s ease;
      }
      #initial-loader.hidden { opacity: 0; pointer-events: none; }
      #il-logo {
        font-size: 2rem; font-weight: 900;
        background: linear-gradient(135deg, #00f2ff, #7b42f6);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 16px; text-align: center;
      }
      #il-bar {
        width: 150px; height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 99px; overflow: hidden;
      }
      #il-fill {
        height: 100%;
        background: linear-gradient(90deg, #00f2ff, #7b42f6);
        border-radius: 99px;
        animation: il-anim 1.1s ease-in-out infinite alternate;
      }
      @keyframes il-anim {
        from { width: 15%; margin-right: 85%; }
        to   { width: 85%; margin-right: 0%;  }
      }
      /* iOS safe area */
      @supports (padding-bottom: env(safe-area-inset-bottom)) {

          padding-bottom: env(safe-area-inset-bottom) !important;
        }
        .floating-theme-btn-smart {

      @supports (padding-top: env(safe-area-inset-top)) {

    <!-- Loading screen (removed after React mounts) -->
    <div id="initial-loader">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div id="il-logo">UNIVEXAM</div>
        <div id="il-bar"><div id="il-fill"></div></div>
      </div>
    </div>

    <div id="root"></div>

    <!-- Apply theme + hide loader when React renders -->
    <script>
      (function () {
        // Prevent theme flash
        if (localStorage.getItem('univexam_theme') === 'rose') {
          document.body.classList.add('theme-rose');
        }
        // Hide loader when React inserts children into #root
        var root = document.getElementById('root');
        var loader = document.getElementById('initial-loader');
        if (!root || !loader) return;
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) {
            loader.classList.add('hidden');
            setTimeout(function () { if (loader.parentNode) loader.parentNode.removeChild(loader); }, 400);
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true });
      })();
    </script>

    <!-- ===================== SERVICE WORKER ===================== -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (reg) {
              // Check for updates every 60s on mobile
              if (navigator.connection && navigator.connection.saveData) return;
              setInterval(function () { reg.update(); }, 60000);
            })
            .catch(function (err) {
              console.warn('SW registration failed:', err);
            });
        });
      }
    </script>
